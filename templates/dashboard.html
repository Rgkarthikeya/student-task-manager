<!DOCTYPE html>
<html>

<head>

<title>Task Manager</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="/static/style.css">

<script src="/static/script.js"></script>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand">Student Task Manager</span>

<a href="/logout" class="btn btn-danger">Logout</a>

</div>

</nav>

<div class="container mt-4">


<div class="row text-center mb-4">

<div class="col-md-4">

<div class="card bg-primary text-white">

<div class="card-body">

<h4>{{total}}</h4>

<p>Total Tasks</p>

</div>

</div>

</div>


<div class="col-md-4">

<div class="card bg-success text-white">

<div class="card-body">

<h4>{{completed}}</h4>

<p>Completed</p>

</div>

</div>

</div>


<div class="col-md-4">

<div class="card bg-warning text-white">

<div class="card-body">

<h4>{{pending}}</h4>

<p>Pending</p>

</div>

</div>

</div>

</div>


<input
id="search"
class="form-control mb-3"
placeholder="Search tasks..."
onkeyup="searchTask()"
>


<form action="/add_task" method="POST" class="row g-3">

<div class="col-md-5">

<input name="title" class="form-control" placeholder="Task title">

</div>

<div class="col-md-5">

<input name="description" class="form-control" placeholder="Description">

</div>

<div class="col-md-2">

<button class="btn btn-primary w-100">Add</button>

</div>

</form>

<hr>


<div class="row">

{% for task in tasks %}

<div class="col-md-4 task-card">

<div class="card shadow mb-3">

<div class="card-body">

<h5>{{task.title}}</h5>

<p>{{task.description}}</p>

<span class="badge bg-{% if task.status=='Completed' %}success{% else %}warning{% endif %}">

{{task.status}}

</span>

<br><br>

<small class="text-muted">

Created: {{task.created_at.strftime('%d %b %Y')}}

</small>

<br><br>

<a href="/complete/{{task.id}}" class="btn btn-success btn-sm">

Complete

</a>

<a
href="/delete/{{task.id}}"
onclick="return confirmDelete()"
class="btn btn-danger btn-sm">

Delete

</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>

</html>
